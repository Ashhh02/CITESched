services:
  app:
    build:
      context: ..
      dockerfile: citesched_server/Dockerfile
    ports:
      - "10000:10000"
    depends_on:
      - postgres
      - redis
    environment:
      PORT: "10000"
      SERVERPOD_PUBLIC_HOST: localhost
      SERVERPOD_PUBLIC_PORT: "10000"
      SERVERPOD_PUBLIC_SCHEME: http
      SERVERPOD_DATABASE_HOST: postgres
      SERVERPOD_DATABASE_PORT: "5432"
      SERVERPOD_DATABASE_NAME: citesched
      SERVERPOD_DATABASE_USER: postgres
      SERVERPOD_DATABASE_PASSWORD: "2_HmLlxC1SzrZSUxd4La6iNo01pj_9ce"
      SERVERPOD_DATABASE_REQUIRE_SSL: "false"
      SERVERPOD_SHARED_PASSWORD: "change-me"
      SERVERPOD_SERVICE_SECRET: "local-dev-service-secret-change-me"
      SERVERPOD_EMAIL_SECRET_HASH_PEPPER: "local-dev-email-pepper-change-me"
      SERVERPOD_JWT_HMAC_SHA512_PRIVATE_KEY: "local-dev-jwt-private-key-change-me"
      SERVERPOD_JWT_REFRESH_TOKEN_HASH_PEPPER: "local-dev-refresh-pepper-change-me"
      SERVERPOD_SERVER_SIDE_SESSION_KEY_HASH_PEPPER: "local-dev-session-pepper-change-me"
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: citesched
      POSTGRES_PASSWORD: "2_HmLlxC1SzrZSUxd4La6iNo01pj_9ce"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - citesched_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "PkMk-n0HAWchm81BsLW_P3xxV7IyS7RA"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: citesched_test
      POSTGRES_PASSWORD: "C6goI_s96raJrkAVbE44QMi56F_nFT7t"
    volumes:
      - citesched_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "poC9ehBbcl5WIVa2LtSHl4zdnFc33DvB"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  citesched_data:
  citesched_test_data:
